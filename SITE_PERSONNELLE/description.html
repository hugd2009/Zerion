    <div class="container">
      <label class="texte1"
        >J’ai créé un site web intégrant une intelligence artificielle dans le
        cadre d’un projet personnel. Pour cela, j’ai développé une interface en
        utilisant du HTML, CSS et JavaScript, ce qui m’a permis de concevoir
        l’interface utilisateur et de gérer les différentes interactions avec
        les utilisateurs.</label
      >
      <label class="texte2"
        >Pour le fonctionnement de l’intelligence artificielle, j’ai utilisé la
        plateforme Ollama, qui permet d’exécuter des modèles de langage
        directement sur une machine locale. J’ai choisi le modèle Llama comme
        moteur de l’IA en raison de ses bonnes performances en compréhension et
        en génération de texte. L’utilisation d’Ollama m’a permis d’intégrer
        facilement le modèle au site web tout en gardant le contrôle sur
        l’exécution et les données traitées par l’application.</label
      >
      <label class="texte3"
        >Ce travail me permet de m’exercer en développement web, notamment en
        HTML et CSS, tout en découvrant comment fonctionne une IA. Cela me donne
        aussi l’occasion de voir ce qu’il se passe derrière, comme la
        communication entre le site et le modèle, et de mieux comprendre le
        fonctionnement global.</label
      >
