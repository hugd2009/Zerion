<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Site personnelle Hugo</title>
    <link rel="stylesheet" href="style_Zerion.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Zen+Dots&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="navigation">
      <h1 class="titleNav">Zerion</h1>
      <div class="nav-right">
        <a class="navigation1" href="Index.html">Zerion</a>
        <a class="navigation2" href="Description.html">Description</a>
        <a class="navigation3" href="CV.html">Mon CV</a>
      </div>
    </div>
    <div class="container">
      <img class="" src="..\" alt="" />

      <div id="accueil">
        <p class="welcome">Bienvenue sur l'IA Zerion.</p>
        <div class="box">
          <textarea
            class="input-chat"
            id="input-accueil"
            onkeydown="typeWriter(event)"
            placeholder="Ecrire un message ..."
          ></textarea>
          <input
            class="submit"
            type="button"
            value="Envoyer"
            onclick="envoyerMessage()"
          />
        </div>
      </div>
      <div id="chat" style="display: none">
        <div id="message"></div>
        <div class="box">
          <textarea
            class="input-chat"
            id="input-chat"
            placeholder="Ecrire un message ..."
          ></textarea>
          <input
            class="submit"
            type="button"
            value="Envoyer"
            onclick="envoyerMessage()"
          />
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
